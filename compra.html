<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Auto Street</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <link rel="icon" type="image/x-icon" href="logocarro1.png">
</head>

<body style="margin:0; font-family: Arial;">

<div style="display:flex; height:100vh;">

    <div style="width:50%; text-align:center; padding-top:100px; background-color: black;">
        <img src="logocarro1.png" width="300"><br>
        <p style="color:white;">
            Auto Street: o carro ideal para cada estilo, preço e caminho.
        </p>
    </div>

    <div style="width:50%; background-color:rgb(173, 0, 0); display:flex; justify-content:center; align-items:center;">
        
        <div style="width:60%; background:white; padding:40px; border-radius:10px; text-align:center;">
            <h3>Escolha a forma de pagamento</h3>
            <br>

            <button class="btn btn-danger w-100 mb-2" onclick="pagar('Pix')">Pix</button>
            <button class="btn btn-danger w-100 mb-2" onclick="pagar('Dinheiro')">Dinheiro</button>
            <button class="btn btn-danger w-100 mb-2" onclick="pagar('Crédito')">Cartão de Crédito</button>
            <button class="btn btn-danger w-100 mb-2" onclick="pagar('Débito')">Cartão de Débito</button>
        </div>

    </div>

</div>

<script>
function pagar(metodo) {
    Swal.fire({
        title: 'Compra efetuada!',
        text: 'Pagamento realizado via ' + metodo,
        icon: 'success',
        confirmButtonText: 'OK'
    }).then(() => {
        window.location.href = "projeto1.html";
    });
}
</script>

</body>
</html>
